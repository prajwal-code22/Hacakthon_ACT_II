version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: ai-router-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./router_model:/router_model

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend

    container_name: ai-router-frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama

    restart: unless-stopped

  backend:
    build: ./backend

    depends_on:
      - ollama

    environment:
      OLLAMA_URL: http://ollama:11434

volumes:
  ollama: